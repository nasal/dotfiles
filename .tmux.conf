##### Terminal / colors #####
set -g default-terminal "${TERM}"
set -ga terminal-overrides ",*:Tc"

# Faster key response (ESC / Neovim etc.)
set -sg escape-time 0

##### Indexing #####
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

##### Mouse support #####
set -g mouse on
set -g allow-passthrough on
set -s set-clipboard off

# Normal wheel: scroll tmux history (copy-mode)
bind -n WheelUpPane   copy-mode -e \; send -X scroll-up
bind -n WheelDownPane copy-mode -e \; send -X scroll-down

# Shift + wheel: send wheel to the application (vim, less, etc.)
bind -n S-WheelUpPane   send -M
bind -n S-WheelDownPane send -M

##### Prefix (Ctrl-a like screen) #####
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### Default shell path behavior #####

# New windows/splits inherit current pane CWD (very important)
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

##### Pane navigation (no prefix) #####
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

##### Pane resizing (no prefix) #####
bind -n M-S-Left  resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up    resize-pane -U 2
bind -n M-S-Down  resize-pane -D 2

##### Copy mode (vim-like) #####
setw -g mode-keys vi

# In copy-mode-vi: start selection with v, copy with y
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

##### Windows ("tabs") management #####

# Rename tab (window)
bind r command-prompt -I "#W" "rename-window '%%'"
bind S command-prompt -I "#W" "rename-session '%%'"

# Close current tab without confirmation
bind w kill-window

# Quick window switching with Shift+Left/Right (optional)
bind -n S-Left  previous-window
bind -n S-Right next-window

##### Status bar (clean, informative, clickable) #####
set -g status on
set -g status-interval 1
set -g status-position top
set -g status-justify left

##### Scrollback #####
set -g history-limit 100000

##### Plugins (TPM) #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session persistence (closest to wezterm-sessions)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save every 5 minutes, auto-restore on start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Optional: resurrect captures more shell state (not perfect, but useful)
set -g @resurrect-capture-pane-contents 'on'

# Dracula theme
set -g @plugin 'dracula/tmux'
set -g @dracula-show-powerline true
set -g @dracula-fixed-location "Kozina"
set -g @dracula-plugins "time"
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-show-fahrenheit false
set -g @dracula-day-month true

run -b '~/.tmux/plugins/tpm/tpm'
